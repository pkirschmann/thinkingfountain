<B><FONT SIZE=4 COLOR="#C1762C">Recent Message about Frog Eggs</font></B><form NAME="isn1"><select NAME="isna" SIZE=10>
          <option VALUE="mlgus.htm" onClick = "">To: thinkingfountain&#64;smm.org
          <option VALUE="mlgus.htm" onClick = "">Date: Tue, 27 Jan 1998 18:24:36
          EST
          <option VALUE="mlgus.htm" onClick = "">Subject: Where can I order frog
          eggs?
          <option VALUE="musc.htm" onClick = "" selected>
          <option VALUE="musc.htm" onClick = "">
          <option VALUE="alphc.htm" onClick = ""><PRE> Dear Karen,
          <option VALUE="alphc.htm" onClick = "">If you do have an address of
          where I can order eggs,
          <option VALUE="alphc.htm" onClick = "">or tadpoles I'd be happy if you
          would send it to me,
          <option VALUE="alphc.htm" onClick = "">and further information. For
          the now the breed
          <option VALUE="alphc.htm" onClick = "">doesn't matter to me, but I would
          surely appreciate
          <option VALUE="alphc.htm" onClick = "">it if you would help me. If you
          can not help me,
          <option VALUE="alphc.htm" onClick = "">please suggest a website, or
          place I can visit to
          <option VALUE="alphc.htm" onClick = "">order tadpoles or eggs. I just
          moved to Arizona,
          <option VALUE="alphc.htm" onClick = "">from Washington state, so there
          are no ponds
          <option VALUE="alphc.htm" onClick = "">and streams here as I am use
          to.
          <option VALUE="alphc.htm" onClick = "">
          <option VALUE="alphc.htm" onClick = "">Thankyou
          <option VALUE="alphc.htm" onClick = "">__________________
          <option VALUE="alphc.htm" onClick = "">Hi,
          <option VALUE="alphc.htm" onClick = "">
          <option VALUE="alphc.htm" onClick = "">Wow - Washington to Arizona,
          now that's a completely
          <option VALUE="alphc.htm" onClick = "">different habitat! I think I
          can help with the frogs.
          <option VALUE="alphc.htm" onClick = "">I order eggs from a local biological
          supply house
          <option VALUE="alphc.htm" onClick = "">here in Minnesota. I don't think
          they would ship the
          <option VALUE="alphc.htm" onClick = "">eggs because they're native species.
          <option VALUE="alphc.htm" onClick = "">
          <option VALUE="alphc.htm" onClick = "">You can get tadpoles through
          NASCO Science Supply,
          <option VALUE="alphc.htm" onClick = "">I've always had success with
          their tadpoles.
          <option VALUE="alphc.htm" onClick = "">They have a website -
          <option VALUE="alphc.htm" onClick = "">http://www.nascofa.com/Catalogs/SCcatalog.html
          <option VALUE="alphc.htm" onClick = "">
          <option VALUE="alphc.htm" onClick = "">They also have an 800 number
          you can all and request
          <option VALUE="alphc.htm" onClick = "">a catalog 1-800-558-9595.
          <option VALUE="alphc.htm" onClick = "">
          <option VALUE="alphc.htm" onClick = "">Good Luck.
          <option VALUE="alphc.htm" onClick = "">Let me know how it goes.
          <option VALUE="alphc.htm" onClick = "">-karen
